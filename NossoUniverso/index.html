<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nosso Universo ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>

<body>

<div id="hearts"></div>

<div class="card">

    <h1>Para o amor da minha vida</h1>

    <p>Existem presentes que se compram.</p>

    <p>Existem presentes que se fazem.</p>

    <p>E existem aqueles feitos com tempo, carinho... e algumas linhas de código.</p>

    <p><strong>Esse é um deles.</strong></p>

    <button id="startButton">
        Começar ❤️
    </button>

</div>
<section id="letter" class="hidden">

    <div class="paper">

        <h2>💌</h2>

        <div id="typedText"></div>

        <button id="nextButton" class="hidden">
            Quero te mostrar nossas memórias ❤️
        </button>

    </div>

</section>

<audio id="music" loop>
    <source src="musica.mp3/musica.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</html>
